<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a1a2e">Ontology-Driven Agent Tool Execution Path</text>

  <!-- User Question -->
  <rect x="260" y="50" width="280" height="45" rx="8" fill="#e8f4fd" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="78" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a1a2e">User Question (Natural Language)</text>

  <line x1="400" y1="95" x2="400" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent Orchestrator -->
  <rect x="220" y="120" width="360" height="45" rx="10" fill="#29B5E8" stroke="#1a8bb5" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="148" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">PREPARED911_AGENT (Cortex Orchestrator)</text>

  <line x1="400" y1="165" x2="400" y2="195" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: Ontology Resolution -->
  <rect x="120" y="195" width="560" height="110" rx="10" fill="#fff8f0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <rect x="120" y="195" width="560" height="30" rx="10" fill="#e67e22"/>
  <text x="400" y="215" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Step 1: Ontology Resolution (Custom Tool — AGENT_RESOLVE_ONTOLOGY)</text>

  <rect x="140" y="235" width="160" height="55" rx="6" fill="white" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="220" y="255" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e67e22">Resolve Concepts</text>
  <text x="220" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">NIEM/NIMS classes</text>
  <text x="220" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">MPDS codes, NFPA standards</text>

  <rect x="320" y="235" width="160" height="55" rx="6" fill="white" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="255" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e67e22">Map Resources</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Incident → required units</text>
  <text x="400" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Resource type hierarchy</text>

  <rect x="500" y="235" width="160" height="55" rx="6" fill="white" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="580" y="255" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e67e22">Identify Protocols</text>
  <text x="580" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Applicable SOPs</text>
  <text x="580" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Regulatory frameworks</text>

  <line x1="400" y1="305" x2="400" y2="330" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="405" y="322" font-family="Arial" font-size="9" fill="#888">Structured context</text>

  <!-- Step 2: Informed Data Retrieval -->
  <rect x="120" y="330" width="560" height="110" rx="10" fill="#f0fff0" stroke="#2ecc71" stroke-width="2" filter="url(#shadow)"/>
  <rect x="120" y="330" width="560" height="30" rx="10" fill="#2ecc71"/>
  <text x="400" y="350" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Step 2: Informed Data Retrieval (with precise ontology context)</text>

  <rect x="140" y="370" width="160" height="55" rx="6" fill="white" stroke="#29B5E8" stroke-width="1" filter="url(#shadow)"/>
  <text x="220" y="390" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#29B5E8">Cortex Analyst</text>
  <text x="220" y="405" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">3 Semantic Views</text>
  <text x="220" y="417" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Precise SQL from ontology</text>

  <rect x="320" y="370" width="160" height="55" rx="6" fill="white" stroke="#2ecc71" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2ecc71">Cortex Search</text>
  <text x="400" y="405" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">3 Search Services</text>
  <text x="400" y="417" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Protocols, narratives, KB</text>

  <rect x="500" y="370" width="160" height="55" rx="6" fill="white" stroke="#e74c3c" stroke-width="1" filter="url(#shadow)"/>
  <text x="580" y="390" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e74c3c">ML Predictions</text>
  <text x="580" y="405" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">3 Registered Models</text>
  <text x="580" y="417" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">MODEL()!PREDICT()</text>

  <line x1="400" y1="440" x2="400" y2="465" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="405" y="457" font-family="Arial" font-size="9" fill="#888">Combined results</text>

  <!-- Step 3: Validated Response -->
  <rect x="170" y="465" width="460" height="60" rx="10" fill="#f5f0ff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="170" y="465" width="460" height="28" rx="10" fill="#9b59b6"/>
  <text x="400" y="484" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Step 3: Validated Response</text>
  <text x="400" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Ontology-grounded terminology + deterministic concept resolution</text>

  <line x1="400" y1="525" x2="400" y2="550" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Final Answer -->
  <rect x="260" y="550" width="280" height="35" rx="8" fill="#e8f4fd" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="573" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1a2e">Precise, Standards-Aligned Answer</text>
</svg>
