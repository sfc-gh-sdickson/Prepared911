<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <rect width="900" height="650" fill="white"/>
  <text x="450" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1a1a2e">Prepared911 Intelligence Agent — System Architecture</text>

  <!-- User Layer -->
  <rect x="340" y="55" width="220" height="50" rx="8" fill="#e8f4fd" stroke="#29B5E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a1a2e">911 Center Users</text>

  <!-- Arrow down -->
  <line x1="450" y1="105" x2="450" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#666"/></marker></defs>

  <!-- Agent Orchestrator -->
  <rect x="250" y="130" width="400" height="60" rx="10" fill="#29B5E8" stroke="#1a8bb5" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="158" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">PREPARED911_AGENT</text>
  <text x="450" y="178" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Cortex Agent Orchestrator</text>

  <!-- Three tool columns -->
  <!-- Left: Cortex Analyst -->
  <rect x="30" y="230" width="260" height="200" rx="8" fill="#f0f8ff" stroke="#29B5E8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="255" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#29B5E8">Cortex Analyst (Text-to-SQL)</text>
  <rect x="50" y="270" width="220" height="40" rx="5" fill="white" stroke="#29B5E8" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="294" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">SV_INCIDENT_OPERATIONS</text>
  <rect x="50" y="320" width="220" height="40" rx="5" fill="white" stroke="#29B5E8" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="344" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">SV_CALL_CENTER_PERFORMANCE</text>
  <rect x="50" y="370" width="220" height="40" rx="5" fill="white" stroke="#29B5E8" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="394" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">SV_RESOURCE_MANAGEMENT</text>

  <!-- Center: Cortex Search -->
  <rect x="320" y="230" width="260" height="200" rx="8" fill="#f0fff0" stroke="#2ecc71" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="255" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2ecc71">Cortex Search (RAG)</text>
  <rect x="340" y="270" width="220" height="40" rx="5" fill="white" stroke="#2ecc71" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="294" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">PROTOCOL_SEARCH</text>
  <rect x="340" y="320" width="220" height="40" rx="5" fill="white" stroke="#2ecc71" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="344" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">INCIDENT_NARRATIVE_SEARCH</text>
  <rect x="340" y="370" width="220" height="40" rx="5" fill="white" stroke="#2ecc71" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="394" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">ONTOLOGY_KNOWLEDGE_SEARCH</text>

  <!-- Right: Custom Functions -->
  <rect x="610" y="230" width="260" height="200" rx="8" fill="#fff8f0" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="255" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e67e22">Custom Functions (ML + Ontology)</text>
  <rect x="630" y="270" width="220" height="40" rx="5" fill="white" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="740" y="294" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">PREDICT_RESPONSE_TIME</text>
  <rect x="630" y="320" width="220" height="40" rx="5" fill="white" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="740" y="344" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">RESOLVE_ONTOLOGY</text>
  <rect x="630" y="370" width="220" height="40" rx="5" fill="white" stroke="#e67e22" stroke-width="1" filter="url(#shadow)"/>
  <text x="740" y="394" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">GET_ZONE_SUMMARY</text>

  <!-- Data Layer -->
  <rect x="30" y="470" width="840" height="50" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="500" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">PREPARED911_INTELLIGENCE Database</text>

  <!-- Schema boxes -->
  <rect x="50" y="545" width="230" height="80" rx="6" fill="white" stroke="#29B5E8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="165" y="570" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#29B5E8">RAW Schema</text>
  <text x="165" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">9 tables: Calls, Incidents,</text>
  <text x="165" y="605" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Units, Personnel, QA, Protocols</text>

  <rect x="335" y="545" width="230" height="80" rx="6" fill="white" stroke="#2ecc71" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="570" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2ecc71">ANALYTICS Schema</text>
  <text x="450" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Views, Semantic Views,</text>
  <text x="450" y="605" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">ML Models, Search Services</text>

  <rect x="620" y="545" width="230" height="80" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="735" y="570" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e67e22">ONTOLOGY Schema</text>
  <text x="735" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">NIEM/NIMS Classes, Properties,</text>
  <text x="735" y="605" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Relationships, Hierarchies</text>

  <!-- Connecting lines -->
  <line x1="160" y1="430" x2="160" y2="470" stroke="#29B5E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="450" y1="430" x2="450" y2="470" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="740" y1="430" x2="740" y2="470" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="165" y1="520" x2="165" y2="545" stroke="#29B5E8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="450" y1="520" x2="450" y2="545" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="735" y1="520" x2="735" y2="545" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Agent to tools lines -->
  <line x1="350" y1="190" x2="160" y2="230" stroke="#29B5E8" stroke-width="1.5"/>
  <line x1="450" y1="190" x2="450" y2="230" stroke="#2ecc71" stroke-width="1.5"/>
  <line x1="550" y1="190" x2="740" y2="230" stroke="#e67e22" stroke-width="1.5"/>
</svg>
